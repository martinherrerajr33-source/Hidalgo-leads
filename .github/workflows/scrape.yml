name: Hidalgo Motivated Seller Scrape
on:
  schedule:
    - cron: "0 7 * * *"   # 7:00 UTC = 1:00 AM Central (2:00 AM CDT)
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: hidalgo-scrape
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml dbfread playwright
          python -m playwright install --with-deps chromium
      - name: Run scraper
        env:
          LOOKBACK_DAYS: "7"
          # HCAD bulk parcel/appraisal export (HCADShapefiles.zip, hosted on Google Drive
          # per hidalgo.prodigycad.com/data-downloads)
          CAD_BULK_URL: "https://drive.usercontent.google.com/download?id=1jdNqzlfEVDkSbWp2eva7S1U93rlDhZdo&export=download&confirm=t"
        run: python scraper/fetch.py
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_import.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily lead scrape: $(date -u +'%Y-%m-%d')"
            git push
          fi
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/
  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
